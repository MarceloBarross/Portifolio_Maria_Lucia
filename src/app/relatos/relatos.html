<section class="relatos">
    <div id="titulo_Relatos">
      <h2 class="noto">Relatos de quem confia</h2>
    </div>
    <div class="card">
      <p-carousel
        class="atendimentos"
        [value]="relatos"
        [numVisible]="3"
        [numScroll]="1"
        [circular]="true"
        [responsiveOptions]="responsiveOptions"
        autoplayInterval="5000"
      >
        <ng-template let-relato #item>
          <div class="card-relatos">
            <div class="div-estrelas">
              <i class="pi pi-star-fill star" style="font-size: 1rem"></i>
              <i class="pi pi-star-fill star" style="font-size: 1rem"></i>
              <i class="pi pi-star-fill star" style="font-size: 1rem"></i>
              <i class="pi pi-star-fill star" style="font-size: 1rem"></i>
              <i class="pi pi-star-fill star" style="font-size: 1rem"></i>
            </div>
            <div class="">
              <div class="descricao-ava manrope">{{ relato.depoimento }}</div>
            </div>
            <div class="letra-nome">
              <div class="letra manrope" [style.background-color]="relato.cor">
                <b>{{ relato.nome.charAt(0) }}</b>
              </div>
              <div class="nome-ava manrope">{{ relato.nome }}</div>
            </div>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </section>
